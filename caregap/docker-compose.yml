services:
  mysql:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  openemr:
    image: openemr/openemr:7.0.2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      MYSQL_DATABASE: openemr
      OE_USER: admin
      OE_PASS: pass
      OPENEMR_SETTING_rest_api: 1
      OPENEMR_SETTING_rest_fhir_api: 1
      OPENEMR_SETTING_rest_system_scopes_api: 1
      OPENEMR_SETTING_site_addr_oath: "https://localhost:9300"
    ports:
      - "9300:443"
      - "9301:80"
    volumes:
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
      - openemr_logs:/var/log
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      OPENEMR_BASE_URL: https://openemr:443/apis/default/api
      OPENEMR_FHIR_URL: https://openemr:443/apis/default/fhir
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
      MYSQL_DATABASE: openemr
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAINTRUST_API_KEY: ${BRAINTRUST_API_KEY:-}
      BRAINTRUST_PROJECT: ${BRAINTRUST_PROJECT:-CareGap}
      BLUEBUTTON_CLIENT_ID: ${BLUEBUTTON_CLIENT_ID:-}
      BLUEBUTTON_CLIENT_SECRET: ${BLUEBUTTON_CLIENT_SECRET:-}
      BLUEBUTTON_BASE_URL: https://sandbox.bluebutton.cms.gov/v2/fhir
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  mysql_data:
  openemr_sites:
  openemr_logs:
